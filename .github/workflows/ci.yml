name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Lint
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Test native core
        run: npm run test:native
      - name: Run sandbox regression
        run: npm run test:sandbox
      - name: Build Windows bundles
        run: npm run desktop:build
      - name: Upload unsigned test bundles
        uses: actions/upload-artifact@v7
        with:
          name: XunDuTerminal-windows-${{ github.sha }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
          if-no-files-found: error
